<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MatheArena</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;font-family:Arial,sans-serif;color:#fff;min-height:100vh;padding:20px}
h1{color:#FFD93D;font-size:2rem;text-align:center;margin-bottom:8px}
.sub{color:rgba(255,255,255,.4);text-align:center;font-size:.9rem;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:700px;margin:0 auto}
.card{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:20px;padding:20px;text-align:center;cursor:pointer;text-decoration:none;color:#fff;display:block;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.97)}
.card .icon{font-size:2.5rem;margin-bottom:8px}
.card .name{font-size:1.1rem;font-weight:700}
.card .desc{font-size:.78rem;opacity:.5;margin-top:4px}
.full{grid-column:span 2}
.c1{border-color:rgba(162,155,254,.4);background:rgba(162,155,254,.08)}
.c2{border-color:rgba(229,112,85,.4);background:rgba(229,112,85,.08)}
.c3{border-color:rgba(253,121,168,.4);background:rgba(253,121,168,.08)}
.c4{border-color:rgba(116,185,255,.4);background:rgba(116,185,255,.08)}
.c5{border-color:rgba(78,205,196,.4);background:rgba(78,205,196,.08)}
.c6{border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.08)}
.call{border-color:rgba(255,217,61,.4);background:rgba(255,217,61,.08)}
</style>
</head>
<body>
<h1>⚔️ MatheArena</h1>
<p class="sub">Wähle ein Thema</p>
<div class="grid">
  <a class="card c1" href="rechnen.html">
    <div class="icon">🔢</div>
    <div class="name">Rechnen</div>
    <div class="desc">+ − × ÷ · Duell · Turnier</div>
  </a>
  <a class="card c2" href="rechnen.html?v=fraction">
    <div class="icon">½</div>
    <div class="name">Brüche</div>
    <div class="desc">Kürzen, addieren, Dezimal</div>
  </a>
  <a class="card c3" href="formeln.html">
    <div class="icon">📐</div>
    <div class="name">Formeln</div>
    <div class="desc">Umstellen · Fläche · Volumen</div>
  </a>
  <a class="card c4" href="formen.html">
    <div class="icon">🔷</div>
    <div class="name">Formen & Körper</div>
    <div class="desc">Erkennen · Eigenschaften</div>
  </a>
  <a class="card c5" href="binom.html">
    <div class="icon">🔣</div>
    <div class="name">Binomische Formeln</div>
    <div class="desc">(a+b)² · (a-b)²</div>
  </a>
  <a class="card c6" href="gleichungen.html">
    <div class="icon">🔡</div>
    <div class="name">Gleichungen</div>
    <div class="desc">x ausrechnen</div>
  </a>
  <a class="card full call" href="rechnen.html?v=all">
    <div class="icon">🌀</div>
    <div class="name">Alles gemischt</div>
    <div class="desc">Alle Rechenthemen kombiniert</div>
  </a>
</div>
</body>
</html>
